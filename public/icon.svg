<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0A0F"/>
      <stop offset="1" stop-color="#111118"/>
    </linearGradient>
    <linearGradient id="dumbbell" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#16A34A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <g filter="url(#glow)" transform="translate(256 256) rotate(45)">
    <rect x="-18" y="-110" width="36" height="220" rx="18" fill="#E2E8F0"/>
    <rect x="-70" y="-150" width="140" height="56" rx="14" fill="url(#dumbbell)"/>
    <rect x="-70" y="94" width="140" height="56" rx="14" fill="url(#dumbbell)"/>
    <rect x="-95" y="-128" width="50" height="12" rx="6" fill="url(#dumbbell)"/>
    <rect x="45" y="-128" width="50" height="12" rx="6" fill="url(#dumbbell)"/>
    <rect x="-95" y="116" width="50" height="12" rx="6" fill="url(#dumbbell)"/>
    <rect x="45" y="116" width="50" height="12" rx="6" fill="url(#dumbbell)"/>
  </g>
</svg>
